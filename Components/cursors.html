<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cursors — Design System</title>
    <link rel="stylesheet" href="css/main.css" />
    <script src="js/include-header.js" defer></script>
    <script src="js/include-footer.js" defer></script>
    <script src="js/toggler.js" defer></script>
    <script src="js/modal.js" defer></script>
    <script src="js/mega-nav.js" defer></script>
    <script src="js/search.js" defer></script>
    <script src="js/dropdown.js" defer></script>
    <script src="js/copy-token.js" defer></script>
  </head>
  <body>
    <div id="site-header"></div>

    <div class="mud-container" data-doc="cursors">
      <div class="mud-doc">
        <div class="mud-row mud-mb-40">
            <div class="mud-col-8">
              <h1 class="mud-desktop-display-xl mud-mb-24">Cursors</h1>
              <p class="mud-text-gray-400 mud-desktop-body-xl mud-mb-32">
                These cursor components are designed to provide relevant context in the Design System documentation.
              </p>
              <p class="mud-text-gray-400 mud-desktop-body-xl">
                Hover the demo area of each card to see the real OS cursor. Click any token name to copy it.
              </p>
            </div>
          </div>
        <div class="mud-doc-main">
      <section aria-labelledby="cursors-system-heading">
        <div class="mud-doc-section-head">
          <h2 class="mud-desktop-heading-sm" id="cursors-system-heading">System macOS</h2>
        </div>

        <div class="cursors-grid">
          
          <div class="cursor-card mud-flex mud-items-center mud-gap-16">
            <div class="cursor-card__preview" style="cursor: default;" aria-hidden="true">
              <svg class="cursor-card__glyph" width="32" height="32" viewBox="0 0 32 32" aria-hidden="true"><use href="#cursor-system-arrow"></use></svg>
            </div>
            <button type="button" class="cursor-card__label token-name font-mono mud-desktop-body-sm-500 mud-text-gray-700" data-token="cursor-system-arrow" title="Click to copy cursor-system-arrow">arrow</button>
          </div>

          
          <div class="cursor-card mud-flex mud-items-center mud-gap-16">
            <div class="cursor-card__preview" style="cursor: copy;" aria-hidden="true">
              <svg class="cursor-card__glyph" width="32" height="32" viewBox="0 0 32 32" aria-hidden="true"><use href="#cursor-system-add"></use></svg>
            </div>
            <button type="button" class="cursor-card__label token-name font-mono mud-desktop-body-sm-500 mud-text-gray-700" data-token="cursor-system-add" title="Click to copy cursor-system-add">add</button>
          </div>

          
          <div class="cursor-card mud-flex mud-items-center mud-gap-16">
            <div class="cursor-card__preview" style="cursor: not-allowed;" aria-hidden="true">
              <svg class="cursor-card__glyph" width="32" height="32" viewBox="0 0 32 32" aria-hidden="true"><use href="#cursor-system-not-allowed"></use></svg>
            </div>
            <button type="button" class="cursor-card__label token-name font-mono mud-desktop-body-sm-500 mud-text-gray-700" data-token="cursor-system-not-allowed" title="Click to copy cursor-system-not-allowed">not-allowed</button>
          </div>

          
          <div class="cursor-card mud-flex mud-items-center mud-gap-16">
            <div class="cursor-card__preview" style="cursor: progress;" aria-hidden="true">
              <svg class="cursor-card__glyph" width="32" height="32" viewBox="0 0 32 32" aria-hidden="true"><use href="#cursor-system-busy-but-clickable"></use></svg>
            </div>
            <button type="button" class="cursor-card__label token-name font-mono mud-desktop-body-sm-500 mud-text-gray-700" data-token="cursor-system-busy-but-clickable" title="Click to copy cursor-system-busy-but-clickable">busy-but-clickable</button>
          </div>

          
          <div class="cursor-card mud-flex mud-items-center mud-gap-16">
            <div class="cursor-card__preview" style="cursor: text;" aria-hidden="true">
              <svg class="cursor-card__glyph" width="32" height="32" viewBox="0 0 32 32" aria-hidden="true"><use href="#cursor-system-text"></use></svg>
            </div>
            <button type="button" class="cursor-card__label token-name font-mono mud-desktop-body-sm-500 mud-text-gray-700" data-token="cursor-system-text" title="Click to copy cursor-system-text">Text</button>
          </div>

          
          <div class="cursor-card mud-flex mud-items-center mud-gap-16">
            <div class="cursor-card__preview" style="cursor: pointer;" aria-hidden="true">
              <svg class="cursor-card__glyph" width="32" height="32" viewBox="0 0 32 32" aria-hidden="true"><use href="#cursor-system-hand-pointing"></use></svg>
            </div>
            <button type="button" class="cursor-card__label token-name font-mono mud-desktop-body-sm-500 mud-text-gray-700" data-token="cursor-system-hand-pointing" title="Click to copy cursor-system-hand-pointing">hand-pointing</button>
          </div>

          
          <div class="cursor-card mud-flex mud-items-center mud-gap-16">
            <div class="cursor-card__preview" style="cursor: grab;" aria-hidden="true">
              <svg class="cursor-card__glyph" width="32" height="32" viewBox="0 0 32 32" aria-hidden="true"><use href="#cursor-system-hand-open"></use></svg>
            </div>
            <button type="button" class="cursor-card__label token-name font-mono mud-desktop-body-sm-500 mud-text-gray-700" data-token="cursor-system-hand-open" title="Click to copy cursor-system-hand-open">hand-open</button>
          </div>

          
          <div class="cursor-card mud-flex mud-items-center mud-gap-16">
            <div class="cursor-card__preview" style="cursor: grabbing;" aria-hidden="true">
              <svg class="cursor-card__glyph" width="32" height="32" viewBox="0 0 32 32" aria-hidden="true"><use href="#cursor-system-hand-closed"></use></svg>
            </div>
            <button type="button" class="cursor-card__label token-name font-mono mud-desktop-body-sm-500 mud-text-gray-700" data-token="cursor-system-hand-closed" title="Click to copy cursor-system-hand-closed">hand-closed</button>
          </div>
        </div>
      </section>
        </div>
      </div>
    </div>

    
    <svg width="0" height="0" style="position:absolute" aria-hidden="true" focusable="false">
      <defs>
        <filter id="cursor-shadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="1" stdDeviation="0.6" flood-color="#000" flood-opacity="0.35" />
        </filter>
      </defs>

      
      <symbol id="cursor-system-arrow" viewBox="0 0 32 32">
        <g filter="url(#cursor-shadow)">
          <path fill="#FFFFFF" stroke="#121212" stroke-width="1.25" stroke-linejoin="round"
                d="M11 9 L11 25.5 L14.7 22 L17.4 28 L19.9 27 L17.3 21 L22 21 Z" />
        </g>
      </symbol>

      
      <symbol id="cursor-system-add" viewBox="0 0 32 32">
        <g filter="url(#cursor-shadow)">
          <path fill="#FFFFFF" stroke="#121212" stroke-width="1.25" stroke-linejoin="round"
                d="M11 9 L11 25.5 L14.7 22 L17.4 28 L19.9 27 L17.3 21 L22 21 Z" />
          <circle cx="22" cy="22" r="5" fill="#1FB573" stroke="#FFFFFF" stroke-width="1.25" />
          <path stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" d="M22 19.5 V24.5 M19.5 22 H24.5" />
        </g>
      </symbol>

      
      <symbol id="cursor-system-not-allowed" viewBox="0 0 32 32">
        <g filter="url(#cursor-shadow)">
          <path fill="#FFFFFF" stroke="#121212" stroke-width="1.25" stroke-linejoin="round"
                d="M11 9 L11 25.5 L14.7 22 L17.4 28 L19.9 27 L17.3 21 L22 21 Z" />
          <circle cx="22" cy="22" r="5" fill="#FFFFFF" stroke="#9E9E9E" stroke-width="1.25" />
          <path stroke="#9E9E9E" stroke-width="1.5" stroke-linecap="round" d="M18.7 25.3 L25.3 18.7" />
        </g>
      </symbol>

      
      <symbol id="cursor-system-busy-but-clickable" viewBox="0 0 32 32">
        <g filter="url(#cursor-shadow)">
          <circle cx="22" cy="22" r="6" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="1.25" />
          <g transform="translate(22 22)">
            <path d="M0 -4 A4 4 0 0 1 3.46 -2 L1.73 -1 A2 2 0 0 0 0 -2 Z" fill="#FF3B30" />
            <path d="M3.46 -2 A4 4 0 0 1 3.46 2 L1.73 1 A2 2 0 0 0 1.73 -1 Z" fill="#FF9500" />
            <path d="M3.46 2 A4 4 0 0 1 0 4 L0 2 A2 2 0 0 0 1.73 1 Z" fill="#FFCC00" />
            <path d="M0 4 A4 4 0 0 1 -3.46 2 L-1.73 1 A2 2 0 0 0 0 2 Z" fill="#34C759" />
            <path d="M-3.46 2 A4 4 0 0 1 -3.46 -2 L-1.73 -1 A2 2 0 0 0 -1.73 1 Z" fill="#007AFF" />
            <path d="M-3.46 -2 A4 4 0 0 1 0 -4 L0 -2 A2 2 0 0 0 -1.73 -1 Z" fill="#AF52DE" />
          </g>
          <path fill="#FFFFFF" stroke="#121212" stroke-width="1.25" stroke-linejoin="round"
                d="M11 9 L11 25.5 L14.7 22 L17.4 28 L19.9 27 L17.3 21 L22 21 Z" />
        </g>
      </symbol>

      
      <symbol id="cursor-system-text" viewBox="0 0 32 32">
        <g filter="url(#cursor-shadow)" fill="none" stroke="#121212" stroke-width="1.5" stroke-linecap="round">
          <path d="M16 8 V24" />
          <path d="M13.5 8 H18.5" />
          <path d="M13.5 24 H18.5" />
          <path d="M14 8 H18" stroke="#FFFFFF" stroke-width="0.6" />
        </g>
      </symbol>

      
      <symbol id="cursor-system-hand-pointing" viewBox="0 0 32 32">
        <g filter="url(#cursor-shadow)">
          <path fill="#FFFFFF" stroke="#121212" stroke-width="1.1" stroke-linejoin="round"
                d="M13.5 18 V11 a1.4 1.4 0 0 1 2.8 0 V17
                   a1.2 1.2 0 0 1 2.3 .3 V17.6
                   a1.2 1.2 0 0 1 2.3 .3 V18.6
                   a1.2 1.2 0 0 1 2.2 .5 V23
                   a4 4 0 0 1 -4 4 H17
                   a4 4 0 0 1 -3.5 -2.2 L11.8 21.6
                   a1.3 1.3 0 0 1 .8 -1.9
                   a1.3 1.3 0 0 1 1.4 .5 Z" />
        </g>
      </symbol>

      
      <symbol id="cursor-system-hand-open" viewBox="0 0 32 32">
        <g filter="url(#cursor-shadow)">
          <path fill="#FFFFFF" stroke="#121212" stroke-width="1.1" stroke-linejoin="round"
                d="M11.5 18 V13 a1.3 1.3 0 0 1 2.5 0 V17
                   V11 a1.3 1.3 0 0 1 2.5 0 V17
                   V11.6 a1.3 1.3 0 0 1 2.5 0 V17
                   V13 a1.3 1.3 0 0 1 2.5 0 V19
                   a5 5 0 0 1 -5 5 H16
                   a5 5 0 0 1 -4.3 -2.5 L10.4 19.5
                   a1.3 1.3 0 0 1 2.2 -1.4 Z" />
        </g>
      </symbol>

      
      <symbol id="cursor-system-hand-closed" viewBox="0 0 32 32">
        <g filter="url(#cursor-shadow)">
          <path fill="#FFFFFF" stroke="#121212" stroke-width="1.1" stroke-linejoin="round"
                d="M12 19 V16 a1.2 1.2 0 0 1 2.4 0 V17.5
                   V15 a1.2 1.2 0 0 1 2.4 0 V17.5
                   V15.4 a1.2 1.2 0 0 1 2.4 0 V17.5
                   V16 a1.2 1.2 0 0 1 2.4 0 V19
                   a4.5 4.5 0 0 1 -4.5 4.5 H16.5
                   A4.5 4.5 0 0 1 12 19 Z" />
        </g>
      </symbol>
    </svg>

    <div id="site-footer"></div>
  </body>
</html>
